# Continuous integration on every PR and push to main.
#
# Report-only on PRs per the locked design: scans surface findings to the
# Security tab but never block a merge. Releases (.github/workflows/release.yml)
# are where strict gating happens — CRITICAL/HIGH there fails the publish.
#
# Backend tests run against real Postgres + Redis service containers (no mocks
# — the suite has integration tests against actual DB + Streams). Frontend
# does tsc + next lint.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ---------------------------------------------------------------------------
  # Backend: lint + pytest with real Postgres + Redis
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rtd
          POSTGRES_PASSWORD: rtd
          POSTGRES_DB: rtd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rtd -d rtd"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://rtd:rtd@localhost:5432/rtd
      REDIS_URL: redis://localhost:6379/0
      # Ollama has no API-key precheck; matches the local .env default and
      # lets run-start tests exercise the default-fallback path without
      # plumbing an Anthropic key into CI. Per-run model selection (Phase 4)
      # is still tested explicitly via monkeypatched settings.
      LLM_PROVIDER: ollama
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: backend
        run: ruff check app tests

      - name: Verify FastAPI app imports with 204 routes
        working-directory: backend
        run: |
          # FastAPI validates 204 response annotations while routers are
          # registered. The old `-> None` route failed during this import on
          # supported 0.115.x environments, before any test could collect.
          python -c "from app.main import app; assert app is not None"

      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head

      # SSE tests in test_events_api.py bypass FastAPI's ASGI transport (it
      # buffers streaming responses) and hit a real uvicorn on localhost:8000.
      # Locally that's the docker-compose backend container; in CI we start
      # uvicorn here as a background process.
      - name: Start uvicorn for SSE tests
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          echo $! > /tmp/uvicorn.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health >/dev/null 2>&1; then
              echo "uvicorn ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "uvicorn failed to start; log:"
          cat /tmp/uvicorn.log
          exit 1

      - name: Pytest
        working-directory: backend
        run: pytest -q

      - name: Stop uvicorn
        if: always()
        run: |
          if [ -f /tmp/uvicorn.pid ]; then
            kill "$(cat /tmp/uvicorn.pid)" 2>/dev/null || true
          fi

  # ---------------------------------------------------------------------------
  # Frontend: tsc + next lint
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (tsc + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        run: npm run lint

  # ---------------------------------------------------------------------------
  # rtd-cli — ruff + pytest. Tests are unit-only (httpx mocked), no services.
  # ---------------------------------------------------------------------------
  cli:
    name: CLI (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: cli/pyproject.toml

      - name: Install
        working-directory: cli
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        working-directory: cli
        run: ruff check src tests

      - name: Pytest
        working-directory: cli
        run: pytest -q

  # ---------------------------------------------------------------------------
  # CodeQL is handled by GitHub's default setup (configured via the
  # `code-scanning/default-setup` API). Default setup and custom workflow
  # uploads can't coexist, so we don't run it from this workflow.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Local onboarding config: parse scripts and Compose without starting Docker.
  # ---------------------------------------------------------------------------
  local-config:
    name: Local onboarding config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bootstrap shell syntax
        run: bash -n scripts/local-up.sh

      - name: Parse base and override Compose configuration
        run: |
          docker compose -f infra/docker-compose.yml config --quiet
          docker compose \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.override.yml \
            config --quiet

      - name: Check documented bootstrap and runtime API variables
        run: |
          grep -Fq './scripts/local-up.sh' README.md
          grep -Fq 'python -m alembic heads' README.md
          docker compose -f infra/docker-compose.yml config \
            | grep -Fq 'RTD_API_BASE_URL: http://localhost:8000'
          docker compose \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.override.yml \
            config | grep -Fq 'RTD_API_BASE_URL: http://localhost:8001'

  # ---------------------------------------------------------------------------
  # Trivy filesystem scan — surfaces dependency CVEs without building images.
  # Image scans live in the release workflow where they gate the publish.
  # ---------------------------------------------------------------------------
  trivy-fs:
    name: Trivy (filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '0'  # report-only on PRs/main
          format: sarif
          output: trivy-fs.sarif
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
