services:
  redis:
    ports: !override
      - "7000:6379"
  backend:
    ports: !override
      - "8001:8000"
  frontend:
    environment:
      # config.ts reads RTD_API_BASE_URL (preferred) -> NEXT_PUBLIC_API_BASE_URL.
      # NOT NEXT_PUBLIC_API_BASE; that name is ignored and the app falls back to
      # http://localhost:8000, which fails with a browser NetworkError when the
      # override publishes the backend on 8001.
      RTD_API_BASE_URL: http://localhost:8001
    ports: !override
      - "3001:3000"
