services:
  redis:
    ports: !override
      - "7000:6379"
  backend:
    ports: !override
      - "8001:8000"
  frontend:
    environment:
      # Keep the runtime API URL aligned with the overridden backend host port.
      RTD_API_BASE_URL: ${RTD_API_BASE_URL:-http://localhost:8001}
    ports: !override
      - "3001:3000"
