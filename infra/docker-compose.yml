name: redteam-dashboard

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rtd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rtd}
      POSTGRES_DB: ${POSTGRES_DB:-rtd}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rtd} -d ${POSTGRES_DB:-rtd}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Ollama is expected to run on the host (default: http://localhost:11434).
  # Containers reach it via host.docker.internal (mapped to host-gateway in the
  # backend + worker extra_hosts below). If you prefer a containerized Ollama,
  # add a service here and set OLLAMA_HOST=http://ollama:11434 in .env.

  backend:
    build:
      context: ../backend
    environment:
      ENV: local
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rtd}:${POSTGRES_PASSWORD:-rtd}@postgres:5432/${POSTGRES_DB:-rtd}
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-7}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-08-01-preview}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: ../backend
    command: ["python", "-m", "app.worker.main"]
    environment:
      ENV: local
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rtd}:${POSTGRES_PASSWORD:-rtd}@postgres:5432/${POSTGRES_DB:-rtd}
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-7}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-08-01-preview}
      # Stage 3+1: worker fails fast at boot if blank. Bootstrap the
      # local-dev key by minting a cli-scoped key inside a running backend
      # and persisting it to infra/.env (read by docker-compose by default,
      # gitignored):
      #   docker compose exec backend python -m app.scripts.mint_api_key \
      #     --name local-worker --scope cli
      #   echo "WORKER_MCP_API_KEY=<paste>" > infra/.env
      #   docker compose up -d worker
      WORKER_MCP_API_KEY: ${WORKER_MCP_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      target: dev
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      # The browser fetches from here; backend is mapped to host port 8000.
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    volumes:
      # Live source bind mount. node_modules and .next stay in named volumes
      # so the host's filesystem doesn't shadow the container's installed deps
      # / build output.
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  frontend_next:
